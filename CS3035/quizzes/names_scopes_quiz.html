<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Names & Scopes Quiz — CS3035</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --surface: #ede9e0;
    --card: #ffffff;
    --border: #d8d2c4;
    --ink: #1c1a16;
    --muted: #8a8070;
    --accent: #c0392b;
    --accent2: #2471a3;
    --accent3: #1e8449;
    --correct: #1e8449;
    --wrong: #c0392b;
    --tag-bg: #fdf6e3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    padding: 2.5rem 1rem 5rem;
  }

  /* Decorative top rule */
  body::before {
    content: '';
    display: block;
    height: 6px;
    background: repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 20px, var(--accent2) 20px, var(--accent2) 40px, var(--accent3) 40px, var(--accent3) 60px, var(--ink) 60px, var(--ink) 80px);
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-top: 0.5rem;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800;
    line-height: 1.05;
    color: var(--ink);
    position: relative;
    display: inline-block;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 0.6rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
  }

  /* Progress */
  .progress-wrap {
    max-width: 660px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Card */
  .quiz-wrap { max-width: 660px; margin: 0 auto; }

  .card {
    background: var(--card);
    border: 2px solid var(--ink);
    padding: 2rem 2rem 1.75rem;
    position: relative;
    box-shadow: 5px 5px 0 var(--ink);
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.1rem;
  }

  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .q-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.15rem 0.5rem;
    border: 1.5px solid;
    text-transform: uppercase;
  }

  .badge-mcq   { border-color: var(--accent2); color: var(--accent2); background: rgba(36,113,163,0.06); }
  .badge-code  { border-color: var(--accent);  color: var(--accent);  background: rgba(192,57,43,0.06); }
  .badge-tf    { border-color: var(--accent3); color: var(--accent3); background: rgba(30,132,73,0.06); }
  .badge-fill  { border-color: #7d3c98;        color: #7d3c98;        background: rgba(125,60,152,0.06); }

  .q-text {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 1.4rem;
    color: var(--ink);
  }

  /* Code block inside question */
  pre {
    background: #1c1a16;
    color: #f5f2eb;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    padding: 1rem 1.2rem;
    margin: 0.75rem 0 1.25rem;
    border-left: 4px solid var(--accent);
    overflow-x: auto;
    white-space: pre;
  }

  .code-comment { color: #8a8070; }
  .code-kw      { color: #e67e22; }
  .code-fn      { color: #5dade2; }
  .code-num     { color: #a9cce3; }
  .code-str     { color: #82e0aa; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 0.5rem; }

  .option {
    border: 1.5px solid var(--border);
    padding: 0.75rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    transition: border-color 0.12s, background 0.12s, transform 0.1s;
    font-size: 0.92rem;
    line-height: 1.5;
    text-align: left;
    background: var(--tag-bg);
  }

  .option:hover:not(.disabled) {
    border-color: var(--ink);
    background: var(--surface);
    transform: translateX(4px);
  }

  .opt-key {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    border: 1.5px solid var(--border);
    padding: 0.1rem 0.35rem;
    flex-shrink: 0;
    margin-top: 0.15rem;
    background: var(--bg);
    color: var(--muted);
  }

  .option.correct { border-color: var(--correct); background: rgba(30,132,73,0.07); }
  .option.correct .opt-key { border-color: var(--correct); color: var(--correct); background: rgba(30,132,73,0.1); }
  .option.wrong   { border-color: var(--wrong);   background: rgba(192,57,43,0.07); }
  .option.wrong .opt-key   { border-color: var(--wrong);   color: var(--wrong);   background: rgba(192,57,43,0.1); }
  .option.disabled { cursor: default; }

  /* Fill */
  .fill-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }

  .fill-input {
    flex: 1;
    min-width: 140px;
    border: 1.5px solid var(--border);
    padding: 0.75rem 0.9rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    background: var(--tag-bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.12s;
  }
  .fill-input:focus { border-color: var(--ink); }
  .fill-input.correct { border-color: var(--correct); background: rgba(30,132,73,0.07); }
  .fill-input.wrong   { border-color: var(--wrong);   background: rgba(192,57,43,0.07); }

  .check-btn {
    padding: 0.75rem 1.2rem;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.12s;
  }
  .check-btn:hover { background: var(--accent); }

  /* Feedback */
  .feedback {
    margin-top: 1.1rem;
    padding: 0.9rem 1rem;
    border-left: 4px solid;
    font-size: 0.88rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; animation: fadeUp 0.25s ease; }
  .feedback.correct-fb { border-color: var(--correct); background: rgba(30,132,73,0.06); color: #145a32; }
  .feedback.wrong-fb   { border-color: var(--wrong);   background: rgba(192,57,43,0.06);  color: #922b21; }
  .feedback strong { font-weight: 700; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Next */
  .next-btn {
    margin-top: 1.4rem;
    width: 100%;
    padding: 0.85rem;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    display: none;
    transition: background 0.12s;
    letter-spacing: 0.04em;
    box-shadow: 3px 3px 0 var(--muted);
  }
  .next-btn:hover { background: var(--accent); box-shadow: 3px 3px 0 #7b241c; }
  .next-btn.show { display: block; animation: fadeUp 0.25s ease; }

  /* Results */
  .results {
    display: none;
    background: var(--card);
    border: 2px solid var(--ink);
    padding: 3rem 2rem;
    text-align: center;
    box-shadow: 5px 5px 0 var(--ink);
  }
  .results.show { display: block; animation: fadeUp 0.4s ease; }

  .score-display {
    font-size: 4rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.25rem;
  }
  .score-display span { color: var(--accent); }

  .results h2 { font-size: 1.4rem; font-weight: 800; margin: 0.75rem 0 0.4rem; }
  .results p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }

  .stat-row {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 2rem;
  }
  .stat { text-align: center; }
  .stat .n { font-size: 2rem; font-weight: 800; }
  .stat .l { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .correct-n { color: var(--correct); }
  .wrong-n   { color: var(--wrong); }

  .restart-btn {
    padding: 0.85rem 2.5rem;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--muted);
    transition: background 0.12s;
  }
  .restart-btn:hover { background: var(--accent); }
</style>
</head>
<body>
<header>
  <div class="eyebrow">CS3035 · Programming Paradigms</div>
  <h1>Names <span>&</span> Scopes</h1>
  <div class="subtitle">Quiz // 10 questions</div>
</header>

<div class="quiz-wrap">
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 10</div>
  </div>

  <div class="card" id="quizCard">
    <div id="questionArea"></div>
  </div>

  <div class="results" id="results">
    <div class="eyebrow" style="margin-bottom:1rem;">Quiz Complete</div>
    <div class="score-display" id="scoreDisplay"></div>
    <h2 id="resultsTitle"></h2>
    <p id="resultsMsg"></p>
    <div class="stat-row">
      <div class="stat"><div class="n correct-n" id="cCount"></div><div class="l">Correct</div></div>
      <div class="stat"><div class="n wrong-n" id="wCount"></div><div class="l">Wrong</div></div>
    </div>
    <button class="restart-btn" onclick="restart()">Try Again</button>
  </div>
</div>

<script>
const Q = [
  {
    type: 'mcq',
    q: 'What is "binding" in the context of programming language names?',
    options: [
      'Compiling a name into machine code',
      'Associating a name to an entity in a program',
      'Restricting a variable to a single type',
      'Importing names from another module'
    ],
    answer: 1,
    feedback: 'Binding is simply the process of associating (linking) a name to an entity — a variable, function, class, etc. For example, writing <code>x = 5</code> in Python binds the name <code>x</code> to the integer entity 5.'
  },
  {
    type: 'tf',
    q: 'True or False: Reusing the same name to refer to different entities in the same context is generally considered good programming practice.',
    options: ['True', 'False'],
    answer: 1,
    feedback: 'False. Reusing the same name for different entities in the same context causes confusion and is generally a bad programming practice that should be avoided.'
  },
  {
    type: 'mcq',
    q: 'What is "scope" in a programming language?',
    options: [
      'The memory size allocated to a variable',
      'The list of all names defined in a program',
      'The region of a program where a name is associated to an entity',
      'The number of times a function can be called'
    ],
    answer: 2,
    feedback: 'Scope is the region of the program in which a name-to-entity binding is valid and accessible. Outside that region, the name may be unbound or refer to something else entirely.'
  },
  {
    type: 'mcq',
    q: 'Which of the following correctly describes how Python marks the start and end of a block?',
    options: [
      'Curly braces {}',
      'begin...end keywords',
      'Indentation',
      'Parentheses ()'
    ],
    answer: 2,
    feedback: 'Python uses indentation to define blocks. C-style languages use {}, and languages like Ada/Pascal use begin...end. The two block types are function blocks and inline blocks.'
  },
  {
    type: 'code',
    q: 'What happens when this Java code is compiled and run?',
    code:
`public void checkNumbers(int[] numbers) {
  for (int i = 0; i < numbers.length; i++) {
    int currentValue = numbers[i];
    if (currentValue > 100) {
      String message = "Large!";
      System.out.println(message);
    }
    System.out.println(message); // ← this line
  }
}`,
    options: [
      'It compiles and runs fine, printing the message for all numbers',
      'It throws a NullPointerException at runtime',
      'It causes a compile error because message is out of scope',
      'It prints "null" for numbers that are not > 100'
    ],
    answer: 2,
    feedback: 'In Java, inline blocks (like if-blocks) introduce a new scope. The variable <code>message</code> is declared inside the if-block, so it is out of scope at the outer println — causing a compile error. In Python, however, inline blocks do NOT create a new scope, so similar code would work.'
  },
  {
    type: 'code',
    q: 'Assume this program uses STATIC (lexical) scope. What is printed?',
    code:
`x = 10

function showX():
    print x

function parent():
    x = 20
    showX()

parent()`,
    options: [
      '20  (uses the x from parent\'s frame)',
      '10  (uses the x from the global/lexical scope where showX is defined)',
      'Error: x is not defined',
      'Nothing is printed'
    ],
    answer: 1,
    feedback: 'With static (lexical) scope, <code>showX</code> looks up <code>x</code> based on where it is *defined* in the source code — at the global level where x = 10. It does NOT look at who called it. So the output is 10.'
  },
  {
    type: 'code',
    q: 'Same code, but now assume DYNAMIC scope. What is printed?',
    code:
`x = 10

function showX():
    print x

function parent():
    x = 20
    showX()

parent()`,
    options: [
      '10  (global x)',
      '20  (x from parent\'s call stack frame)',
      'Error: ambiguous x',
      'Undefined behavior'
    ],
    answer: 1,
    feedback: 'With dynamic scope, name resolution follows the call stack at runtime. When <code>showX()</code> runs, the call stack is: global → parent() → showX(). <code>showX</code> has no local x, so it looks up the stack and finds x = 20 in parent\'s frame. Output: 20.'
  },
  {
    type: 'mcq',
    q: 'What is a "frame" (also called a stack frame or activation record)?',
    options: [
      'A fixed-size memory block used for all global variables',
      'A data structure holding info for a single function execution (params, locals, return address)',
      'The entire call stack at a given point in time',
      'A reference to the current scope in static scope resolution'
    ],
    answer: 1,
    feedback: 'A frame (stack frame / activation record) is created each time a function is called and destroyed when it returns. It holds parameters, local variables, and the return address. Dynamic scope uses the call stack of frames to resolve names.'
  },
  {
    type: 'mcq',
    q: 'What is the difference between overloading and shadowing?',
    options: [
      'Overloading hides an outer variable; shadowing means two functions share a name',
      'Overloading: same name for multiple entities in the same scope (disambiguated by extra info). Shadowing: inner variable hides an outer variable with the same name',
      'They are the same thing — both refer to name conflicts',
      'Shadowing only applies to global variables; overloading only applies to functions'
    ],
    answer: 1,
    feedback: 'Overloading = one name, multiple meanings in the *same* scope (e.g., two methods with different parameters). Shadowing = an inner-scope variable with the same name as an outer-scope variable, causing the outer one to be hidden inside that inner scope.'
  },
  {
    type: 'code',
    q: 'What is the output of this Python code?',
    code:
`x = 10

def foo():
    x = 20
    def bar():
        x = 30
    bar()
    print(x)  # ← what prints here?

foo()
print(x)      # ← and here?`,
    options: [
      '30 then 30',
      '20 then 10',
      '20 then 20',
      '30 then 10'
    ],
    answer: 1,
    feedback: 'In Python, assignment always creates a new *local* variable unless you use <code>global</code> or <code>nonlocal</code>. Inside bar(), <code>x = 30</code> creates a local x — it does NOT modify foo\'s x. So foo prints 20, and the global print shows 10. To modify foo\'s x from bar, you would write <code>nonlocal x</code> inside bar().'
  }
];

let cur = 0, score = 0, wrong = 0;

function render() {
  if (cur >= Q.length) { showResults(); return; }
  const q = Q[cur];
  updateProgress();

  const badgeClass = q.type === 'code' ? 'badge-code' : q.type === 'tf' ? 'badge-tf' : q.type === 'fill' ? 'badge-fill' : 'badge-mcq';
  const badgeLabel = q.type === 'code' ? 'Code Analysis' : q.type === 'tf' ? 'True / False' : q.type === 'fill' ? 'Fill in blank' : 'MCQ';

  const codeBlock = q.code ? `<pre>${q.code}</pre>` : '';

  const keys = ['A','B','C','D'];
  const optionsHtml = `<div class="options">${q.options.map((o,i) =>
    `<button class="option" id="opt${i}" onclick="choose(${i})">
      <span class="opt-key">${keys[i]}</span>
      <span>${o}</span>
    </button>`).join('')}</div>`;

  document.getElementById('questionArea').innerHTML = `
    <div class="card-meta">
      <span class="q-num">Q${cur+1} / ${Q.length}</span>
      <span class="q-badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="q-text">${q.q}</div>
    ${codeBlock}
    ${optionsHtml}
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="next()">${cur === Q.length-1 ? 'See Results →' : 'Next →'}</button>
  `;
}

function choose(idx) {
  const q = Q[cur];
  const isCorrect = idx === q.answer;
  if (isCorrect) score++; else wrong++;
  const keys = ['A','B','C','D'];
  q.options.forEach((_,i) => {
    const el = document.getElementById(`opt${i}`);
    el.classList.add('disabled');
    if (i === q.answer) el.classList.add('correct');
    else if (i === idx && !isCorrect) el.classList.add('wrong');
  });
  showFeedback(isCorrect, q.feedback);
}

function showFeedback(ok, text) {
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${ok ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `<strong>${ok ? '✓ Correct!' : '✗ Not quite.'}</strong> ${text}`;
  document.getElementById('nextBtn').classList.add('show');
}

function next() { cur++; render(); }

function updateProgress() {
  document.getElementById('progressFill').style.width = (cur / Q.length * 100) + '%';
  document.getElementById('progressLabel').textContent = `${cur} / ${Q.length}`;
}

function showResults() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${Q.length} / ${Q.length}`;
  const pct = Math.round(score / Q.length * 100);
  const r = document.getElementById('results');
  r.classList.add('show');
  document.getElementById('scoreDisplay').innerHTML = `${score}<span>/${Q.length}</span>`;
  document.getElementById('cCount').textContent = score;
  document.getElementById('wCount').textContent = wrong;
  let title, msg;
  if (pct === 100) { title = 'Perfect! 🎉'; msg = 'Scopes, frames, static vs dynamic — you\'ve got it all.'; }
  else if (pct >= 70) { title = 'Solid Work 💪'; msg = 'Good grasp of the concepts. Review the code analysis questions you missed.'; }
  else if (pct >= 50) { title = 'Getting There 📚'; msg = 'Re-focus on static vs dynamic scope and Python\'s global/nonlocal rules.'; }
  else { title = 'Keep Studying 🔍'; msg = 'Go back to the slides on scope, frames, and point of declaration — then try again!'; }
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsMsg').textContent = msg;
}

function restart() {
  cur = 0; score = 0; wrong = 0;
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('results').classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
